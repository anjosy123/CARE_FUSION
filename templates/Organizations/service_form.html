{% extends "base.html" %}

{% block content %}
<h2>{% if service %}Edit{% else %}Add{% endif %} Service</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'service_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
