{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <title>Organization Login</title>
  </head>
  <body>
    <div class="container mt-1">
      <div class="row">
        <div class="col-md-6">
          <a href="{% url 'index' %}">
            <img
              src="{% static 'img/home-icon.png' %}"
              alt="Home"
              style="width: 30px; height: 30px; margin-top: 10px"
            />
          </a>
        </div>
      </div>
    </div>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <h3 class="text-center">Organization Login</h3>
          {% if messages %} {% for message in messages %}
          <div
            class="alert alert-{{ message.tags }} alert-dismissible fade show"
            role="alert"
          >
            {{ message }}
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
              aria-label="Close"
            ></button>
          </div>
          {% endfor %} {% endif %}
          <form action="{% url 'org_login' %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="org_regid" class="form-label"
                >Organization Registration Number</label
              >
              <input
                type="text"
                class="form-control"
                id="org_regid"
                name="org_username"
                placeholder="Organization Registration Number"
                required
              />
            </div>
            <br />
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="org_password"
                placeholder="Password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <p class="mt-3">
            Not an Organization? <a href="{% url 'org_signup' %}">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
