{% load static %}
{% load socialaccount %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" acontent="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
      <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Lobster&display=swap" rel="stylesheet"/>
    <title>Singn up</title>
  </head>
  <body>
    <br><br><br><br>
    <div class="container mt-1">
      <div class="row">
        <div class="col-md-6">
          <img class="img-thumbnail" src="{% static 'img/signup_coloumn.jpg' %}">


        </div>
    <div class="col-md-4 mt-2">
      <h4 class="text-black text-center">Sign Up</h4>


      {% for message in messages %}
      <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
        <strong></strong> {{message}}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      {% endfor %}

      <a class="btn btn-sm btn-block btn-light mt-2" id="gp" href="{% provider_login_url 'google' %}">Login With <img src="https://img.icons8.com/color/30/000000/google-logo.png"/></a> 
      <p class="text-center mt-1">OR</p>

      <form action="{% url 'signup' %}" method="post">
        {% csrf_token %}
        <label class="text-black mt-2">UserName</label>
        <div class="form-group">
          <input type="text" class="form-control" id="username" name="username" required>
        <label class="text-black mt-2">Email</label>
        <div class="form-group">
          <input type="Email" class="form-control" id="email" name="email" required>
          <label class="text-black mt-2">Password</label>
          <div class="form-group">
            <input type="password" class="form-control" id="passw1" name="pass1" required>
          <label class="text-black mt-2">Confirm Password</label>
            <div class="form-group">
              <input type="password" class="form-control" id="passw2" name="pass2" required>
        </div>
        <div class="d-grid gap-2 mt-4">
          <button class="btn btn-primary" type="submit">SignIn</button>
        </div>
      </form>
      <br><br>
      <p>Already User? <a href="{% url 'login' %}">Login</a></p>
    </div>
  </body>
</html>
