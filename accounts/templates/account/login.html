{% load static %}
{% load socialaccount %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" acontent="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <title>Login</title>
  </head>
  <body>
    <div class="container mt-1">
      <div class="row">
        <div class="col-md-6">
          <a href="{% url 'index' %}">
            <img src="{% static 'img/home-icon.png' %}" alt="Home" style="width: 30px; height: 30px; margin-top: 10px;">
          </a>
        </div>
      </div>
    </div>
    <br><br><br><br>
    <div class="container mt-1">
      <div class="row">
        <div class="col-md-6">
          <img class="img-thumbnail" src="{% static 'img/new_signup_bg' %}">
        </div>
        <div class="col-md-4 mt-2">
          <br><br>
          <h3 class="text-black text-center">Login</h3>
          
          {% if messages %}
              {% for message in messages %}
                  <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" id="logout-alert">
                      <strong></strong> {{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
              {% endfor %}
          {% endif %}

          <a class="btn btn-sm btn-block btn-light mt-2" id="gp" href="{% provider_login_url 'google' %}">Login With <img src="https://img.icons8.com/color/30/000000/google-logo.png"/></a> 
          <p class="text-center mt-1">OR</p>

          <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <label class="text-black mt-2">UserName</label>
            <div class="form-group">
              <input type="text" class="form-control" id="username" name="username" required>
              <label class="text-black mt-2">Password</label>
              <div class="form-group">
                <input type="password" class="form-control" id="passw1" name="pass1" required>
            </div>
            <div class="d-grid gap-2 mt-4">
              <button class="btn btn-primary" type="submit">Login</button>
            </div>
          </form>
          <br><br>
          <p>Not a User? <a href={% url 'signup' %}>SignUp</a></p>
        </div>
      </div>
    </div>
    <script>
      // Hide the alert after 5 seconds
      setTimeout(function() {
          var alert = document.getElementById('logout-alert');
          if (alert) {
              alert.classList.remove('show');
              alert.classList.add('fade');
              alert.style.display = 'none'; // Optionally set display to none
          }
      }, 5000); // 5000 milliseconds = 5 seconds
    </script>
    <script src="{% static 'js/form-validation.js' %}"></script>
  </body>
</html>
