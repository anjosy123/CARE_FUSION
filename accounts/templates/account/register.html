{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/form-validation.css' %}">
    <title>Organization Signup</title>
</head>
<body>
    <div class="container mt-1">
      <div class="row">
        <div class="col-md-6">
          <a href="{% url 'index' %}">
            <img src="{% static 'img/home-icon.png' %}" alt="Home" style="width: 30px; height: 30px; margin-top: 10px;">
          </a>
        </div>
      </div>
    </div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h3 class="text-center">Organization Signup</h3>
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                <form action="{% url 'org_signup' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="org_username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="org_username" name="org_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="org_email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="org_email" name="org_email" required>
                    </div>
                    <div class="mb-3">
                        <label for="org_name" class="form-label">Organization Name</label>
                        <input type="text" class="form-control" id="org_name" name="org_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="org_address" class="form-label">Address</label>
                        <textarea class="form-control" id="org_address" name="org_address" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="org_phone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="org_phone" name="org_phone" required>
                    </div>
                    <div class="mb-3">
                        <label for="org_password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="org_password" name="org_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="org_confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="org_confirm_password" name="org_confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>
                <p class="mt-3">Already have an account? <a href="{% url 'org_login' %}">Login</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
